# ─── StadiumGenius Docker Compose ───
# Usage: docker compose up --build

services:
  # ── FastAPI Backend (Primary) ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stadiumgenius-api
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      - ENVIRONMENT=production
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Node.js Express (Legacy/Demo) ──
  express:
    build:
      context: ./server
      dockerfile: Dockerfile.node
    container_name: stadiumgenius-express
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # ── Nginx Reverse Proxy (Production) ──
  nginx:
    image: nginx:alpine
    container_name: stadiumgenius-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
